<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
    <title>Ponto por Tag</title>
    <link rel="stylesheet" href="/assets/base.css">
    <style>
        body {
            display: grid;
            place-items: center;
        }

        .stage {
            width: min(92vw, 640px);
            background: linear-gradient(180deg, #1b2126 0%, var(--panel) 100%);
            border: 1px solid var(--border);
            border-radius: 22px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 18px;
            box-shadow: 0 24px 60px rgba(0, 0, 0, .35);
        }

        .display-box {
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, .08);
            border-radius: 12px;
            background: rgba(255, 255, 255, .04);
            text-align: center;
            visibility: hidden;
            width: 100%;
        }

        #foto {
            width: 100%;
            height: min(calc((92vw - 36px) * 0.666), 400px);
            object-fit: contain;
            border-radius: 14px;
            background: #0f1215;
            transition: opacity .2s;
            border: 1px solid rgba(255, 255, 255, .1);
        }

        #nome-funcionario {
            min-height: 44px;
            font-size: 22px;
            font-weight: 700;
        }

        #data-hora {
            min-height: 36px;
            font-size: 16px;
            color: var(--muted);
        }

        #status {
            font-size: 14px;
            color: var(--muted);
            padding: 8px 14px;
            background: rgba(0, 0, 0, .28);
            border-radius: 12px;
            text-align: center;
        }

        #status.online {
            color: var(--accent);
        }

        .header-actions {
            display: flex;
            justify-content: space-between;
            margin-bottom: -6px;
        }
    </style>
</head>
<body>
    <main class="stage">
        <div class="header-actions">
            <a href="/" class="back-link">← Voltar</a>
            <div id="status">Iniciando...</div>
        </div>
        <img id="foto" alt="Foto do funcionario" src="/assets/default.svg" />
        <div id="nome-funcionario" class="display-box">---</div>
        <div id="data-hora" class="display-box">--/--/---- --:--:--</div>
    </main>

    <script src="/assets/utils.js"></script>
    <script src="/assets/ponto-ws.js"></script>
    <script>
        const ui = {
            foto: document.getElementById("foto"),
            nome: document.getElementById("nome-funcionario"),
            data: document.getElementById("data-hora"),
            status: document.getElementById("status")
        };
        let hideTimer = null;

        const appWS = new PontoWS({
            onStatus: (text, online) => {
                ui.status.textContent = text;
                ui.status.className = online ? "online" : "";
            },
            onClear: () => {
                ui.foto.src = DEFAULT_IMAGE;
                ui.nome.style.visibility = "hidden";
                ui.data.style.visibility = "hidden";
                appWS.callbacks.onStatus("Aguardando batida...", true);
            },
            onEntidade: (msg) => {
                ui.foto.src = msg.imagem;
                ui.nome.textContent = msg.nome || "---";
                ui.data.textContent = msg.data_hora || "---";
                ui.nome.style.visibility = "visible";
                ui.data.style.visibility = "visible";

                appWS.callbacks.onStatus("Registro efetuado!", true);
                clearTimeout(hideTimer);
                hideTimer = setTimeout(appWS.callbacks.onClear, 5000);
            }
        });

        appWS.callbacks.onClear(); // Init UI
    </script>
</body>
</html>
