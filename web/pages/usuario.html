<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestão de Usuários</title>
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
    <link rel="stylesheet" href="/assets/base.css">
    <link rel="stylesheet" href="/assets/admin.css">
    <style>
        .cards-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 24px;
        }

        @media(max-width: 900px) {
            .cards-grid {
                grid-template-columns: 1fr;
            }
        }



        #tabela-container {
            min-height: 120px;
        }
    </style>
</head>
<body>
    <div class="container wide">
        <div class="page-header">
            <a href="/" class="back-link">← Menu principal</a>
            <h1>🔐 Gestão de Usuários</h1>
            <div style="width:100px; flex-shrink:0;"></div>
        </div>

        <div class="cards-grid">
            <!-- Cadastro -->
            <div class="card">
                <h2>Cadastrar usuário</h2>
                <form id="form-cadastro">
                    <div class="form-grid" style="grid-template-columns: 1fr;">
                        <div class="field">
                            <label for="nome">Nome</label>
                            <input id="nome" name="nome" required maxlength="120" placeholder="Ex: João da Silva" />
                        </div>
                        <div class="field">
                            <label for="email">E-mail</label>
                            <input id="email" name="email" type="email" required maxlength="120"
                                placeholder="Ex: joao@empresa.com" />
                        </div>
                        <div class="field">
                            <label for="password">Senha</label>
                            <input id="password" name="password" type="password" required minlength="6" maxlength="128"
                                placeholder="Mínimo 6 caracteres" />
                        </div>
                        <div class="field">
                            <label for="perfil">Perfil</label>
                            <select id="perfil" name="perfil" required>
                                <option value="" disabled selected>Selecione um perfil</option>
                                <option value="ADMIN">Administrador</option>
                                <option value="USER">Usuário</option>
                            </select>
                        </div>
                    </div>

                    <button type="submit" class="btn-main" style="width: 100%; margin-top: 16px;">
                        Salvar usuário
                    </button>
                </form>
            </div>

            <!-- Listagem -->
            <div class="card">
                <h2>Usuários cadastrados</h2>

                <div class="filter-bar">
                    <div class="radio-group">
                        <input type="radio" id="filtro-ativo-sim" name="filtro-ativo" value="true" checked />
                        <label for="filtro-ativo-sim">Ativos</label>
                        <input type="radio" id="filtro-ativo-nao" name="filtro-ativo" value="false" />
                        <label for="filtro-ativo-nao">Inativos</label>
                    </div>

                </div>

                <div id="tabela-container" class="table-wrap">
                    <div class="empty-state">Carregando usuários...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="/assets/utils.js"></script>
    <script>
        const formCadastro = document.getElementById('form-cadastro');
        const tabelaContainer = document.getElementById('tabela-container');

        function getFiltroAtivo() {
            const sel = document.querySelector("input[name='filtro-ativo']:checked");
            return sel ? sel.value === 'true' : true;
        }

        function renderTabela(usuarios) {
            if (!Array.isArray(usuarios) || !usuarios.length) {
                tabelaContainer.innerHTML = `<div class="empty-state">Nenhum usuário encontrado.</div>`;
                return;
            }

            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>E-mail</th>
                            <th>Perfil</th>
                            <th>Status</th>
                            <th width="160">Ações</th>
                        </tr>
                    </thead>
                    <tbody>`;

            usuarios.forEach(u => {
                const statusClass = u.ativo ? 'active' : 'inactive';
                const statusLabel = u.ativo ? 'Ativo' : 'Inativo';
                const situacaoLabel = u.ativo ? 'Inativar' : 'Ativar';
                const situacaoClass = u.ativo ? 'btn-danger' : 'btn-secondary';

                const acoes = `
                    <button class="${situacaoClass}" style="padding: 6px 12px; font-size: 0.8rem"
                        onclick="alterarSituacao('${u.id}', '${u.nome}', ${u.ativo})">
                        ${situacaoLabel}
                    </button>
                    <button class="btn-danger" style="padding: 6px 12px; font-size: 0.8rem; margin-left: 6px;"
                        onclick="deletar('${u.id}', '${u.nome}')">
                        Excluir
                    </button>`;

                html += `
                    <tr>
                        <td><strong>${u.nome ?? '-'}</strong></td>
                        <td>${u.email ?? '-'}</td>
                        <td>${u.perfil ?? '-'}</td>
                        <td><span class="tag ${statusClass}">${statusLabel}</span></td>
                        <td style="white-space: nowrap">${acoes}</td>
                    </tr>`;
            });

            html += `</tbody></table>`;
            tabelaContainer.innerHTML = html;
        }

        async function buscarUsuarios() {
            tabelaContainer.style.opacity = '0.4';
            try {
                const ativo = getFiltroAtivo();
                const data = await apiFetch(`/usuario/?ativo=${ativo}`);
                renderTabela(data);
            } catch (e) {
                tabelaContainer.innerHTML = `<div class="empty-state">Erro ao buscar dados.</div>`;
            } finally {
                tabelaContainer.style.opacity = '1';
            }
        }

        async function alterarSituacao(id, nome, ativo) {
            const acao = ativo ? 'inativar' : 'ativar';
            const acaoLabel = ativo ? 'Inativar' : 'Ativar';
            if (!confirm(`${acaoLabel} o usuário "${nome}"?`)) return;
            if (!confirm(`Confirma a alteração de situação de "${nome}"?`)) return;
            try {
                await apiFetch(`/usuario/alterar-situacao/${id}`, { method: 'PUT' });
                showToast(`Usuário ${acao}do com sucesso!`, 'success');
                buscarUsuarios();
            } catch (e) { }
        }

        async function deletar(id, nome) {
            if (!confirm(`Deseja excluir permanentemente o usuário "${nome}"?`)) return;
            if (!confirm(`⚠️ Atenção: esta ação é irreversível e não pode ser desfeita.\nConfirma a exclusão de "${nome}"?`)) return;
            try {
                await apiFetch(`/usuario/${id}`, { method: 'DELETE' });
                showToast('Usuário excluído com sucesso!', 'success');
                buscarUsuarios();
            } catch (e) { }
        }

        formCadastro.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = formCadastro.querySelector("button[type='submit']");
            btn.disabled = true;
            btn.textContent = '⏳ Salvando...';

            const payload = {
                nome: formCadastro.nome.value.trim(),
                email: formCadastro.email.value.trim(),
                password: formCadastro.password.value,
                perfil: formCadastro.perfil.value,
            };

            try {
                const data = await apiFetch('/usuario/', {
                    method: 'POST',
                    body: JSON.stringify(payload),
                });
                showToast(data.detail || 'Usuário cadastrado com sucesso!', 'success');
                formCadastro.reset();
                if (getFiltroAtivo()) buscarUsuarios();
            } catch (e) {
            } finally {
                btn.disabled = false;
                btn.textContent = 'Salvar usuário';
            }
        });

        document.querySelectorAll("input[name='filtro-ativo']").forEach(radio => {
            radio.addEventListener('change', buscarUsuarios);
        });

        buscarUsuarios();
    </script>
</body>
</html>
